name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ── Frontend (Extension + Dashboard) ────────────────────────────────────────
  frontend:
    name: Frontend — Typecheck & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck — shared-types
        run: npx tsc --noEmit -p packages/shared-types/tsconfig.json
        continue-on-error: true

      - name: Typecheck — dashboard
        run: npm run typecheck --workspace=apps/dashboard

      - name: Build — dashboard
        run: npm run build:dashboard

      - name: Build — extension
        run: npm run build:extension

  # ── Backend ──────────────────────────────────────────────────────────────────
  backend:
    name: Backend — Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with ruff
        run: ruff check app/

      - name: Run tests
        run: pytest tests/ -v
        env:
          APP_ENV: test
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/docai_test
          OPENAI_API_KEY: sk-test-placeholder
